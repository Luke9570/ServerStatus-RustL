name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag, for example v1.8.2"
        required: true
        type: string

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  linux-musl:
    name: linux ${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - x86_64-unknown-linux-musl
          - aarch64-unknown-linux-musl
    container:
      image: ghcr.io/rust-cross/rust-musl-cross:${{ matrix.target }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Install build utilities
        run: |
          apt-get update -y -qq
          apt-get install -y -qq protobuf-compiler zip git cmake make g++ llvm

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build release binaries
        run: cargo build --release --locked --target ${{ matrix.target }} -p stat_server -p stat_client

      - name: Prepare release assets
        shell: bash
        run: |
          mkdir -p dist/server dist/client
          cp target/${{ matrix.target }}/release/stat_server dist/server/stat_server
          cp target/${{ matrix.target }}/release/stat_client dist/client/stat_client
          cp config.toml dist/server/config.toml
          cp systemd/stat_server.service dist/server/stat_server.service
          cp systemd/stat_client.service dist/client/stat_client.service
          chmod +x dist/server/stat_server dist/client/stat_client
          (cd dist/server && zip -9 "../server-${{ matrix.target }}.zip" stat_server config.toml stat_server.service)
          (cd dist/client && zip -9 "../client-${{ matrix.target }}.zip" stat_client stat_client.service)

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-${{ matrix.target }}
          path: dist/*.zip

  publish:
    name: publish release
    runs-on: ubuntu-latest
    needs: linux-musl
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Resolve release tag
        id: release
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release.outputs.tag }}
          name: ServerStatus-RustL ${{ steps.release.outputs.tag }}
          files: dist/*.zip
          fail_on_unmatched_files: true
          generate_release_notes: true
          draft: false
