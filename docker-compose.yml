services:
  stat_server:
    image: ghcr.io/luke9570/serverstatus-rustl:latest
    container_name: stat_server
    restart: unless-stopped
    working_dir: /data
    command: ["/stat_server", "-c", "/data/config.toml"]
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - ./config.toml:/data/config.toml:ro
      - ./runtime:/data
    ports:
      - 8080:8080
      # 可选：只有需要直接暴露 gRPC/兼容 Agent 入口时才保留。
      - 9394:9394
    networks:
      - default
      - proxy

networks:
  proxy:
    external: true
